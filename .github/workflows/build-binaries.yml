name: Build binaries

# Runs on every v* tag in parallel with publish.yml — publish.yml is not touched.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform_name: macos-arm64
            archive_cmd: tar
          - os: ubuntu-latest
            platform_name: linux-x86_64
            archive_cmd: tar
          - os: windows-latest
            platform_name: windows-x86_64
            archive_cmd: zip

    runs-on: ${{ matrix.os }}
    name: Build / ${{ matrix.platform_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project dependencies
        run: uv sync --all-extras

      - name: Install PyInstaller (build-time only)
        run: uv tool install "pyinstaller>=6.10"

      - name: Build one-folder bundle
        run: uv run pyinstaller pyinstaller.spec --noconfirm

      # ── Archive (macOS / Linux) ───────────────────────────────────────────
      - name: Archive bundle (tar, Unix)
        if: matrix.archive_cmd == 'tar'
        run: |
          tar czf napari-cotrack-${{ matrix.platform_name }}.tar.gz \
            -C dist napari-cotrack

      # ── Archive (Windows) ─────────────────────────────────────────────────
      - name: Archive bundle (zip, Windows)
        if: matrix.archive_cmd == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\napari-cotrack `
            -DestinationPath napari-cotrack-${{ matrix.platform_name }}.zip

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload artifact (tar)
        if: matrix.archive_cmd == 'tar'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform_name }}
          path: napari-cotrack-${{ matrix.platform_name }}.tar.gz
          if-no-files-found: error

      - name: Upload artifact (zip)
        if: matrix.archive_cmd == 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform_name }}
          path: napari-cotrack-${{ matrix.platform_name }}.zip
          if-no-files-found: error

  # ── Attach all three archives to the GitHub release ──────────────────────
  attach-to-release:
    name: Attach binaries to release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload release assets

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List downloaded files (sanity check)
        run: ls -lh release-assets/

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
